<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NutriSnap</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriSnap">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f0a">
<script>
if ('serviceWorker' in navigator) {
  const sw = `const C='nutri-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))})`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f0a;
  --surface: #111811;
  --surface2: #182018;
  --surface3: #1f291f;
  --border: #243024;
  --accent: #7fff6a;
  --accent2: #ff9f43;
  --accent3: #54d4ff;
  --text: #eef2ee;
  --muted: #5a6e5a;
  --red: #ff6b6b;
  --green: #7fff6a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cabinet Grotesk', sans-serif;
  min-height: 100vh;
  padding-bottom: calc(70px + env(safe-area-inset-bottom));
}

/* BG texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(127,255,106,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,15,10,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: calc(12px + env(safe-area-inset-top)) 18px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-brand {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700;
  font-size: 19px;
  letter-spacing: -0.5px;
  color: var(--accent);
}
.nav-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(17,24,17,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  z-index: 100;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; cursor: pointer; border: none; background: none;
  color: var(--muted); font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 10px; font-weight: 500; gap: 3px; transition: color .15s;
}
.bnav-btn.active { color: var(--accent); }
.bnav-icon { font-size: 20px; }

main { padding: 16px; max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }
.page { display: none; }
.page.active { display: block; }

/* SCAN PAGE */
.scan-zone {
  border: 2px dashed var(--border);
  border-radius: 20px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
  margin-bottom: 14px;
  min-height: 220px;
}
.scan-zone:active { border-color: var(--accent); background: var(--surface2); }
.scan-zone.has-img { border-style: solid; border-color: var(--accent); padding: 0; }
.scan-zone img {
  width: 100%; border-radius: 18px;
  max-height: 280px; object-fit: cover; display: block;
}
.scan-overlay {
  position: absolute; inset: 0; background: rgba(10,15,10,0.5);
  display: flex; align-items: center; justify-content: center;
  border-radius: 18px; opacity: 0; transition: opacity .2s;
}
.scan-zone.has-img:active .scan-overlay { opacity: 1; }
.scan-icon { font-size: 42px; margin-bottom: 10px; }
.scan-label {
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 16px; margin-bottom: 4px;
}
.scan-sub { font-size: 12px; color: var(--muted); text-align: center; }
#file-input { display: none; }

/* FORM */
.form-section { margin-bottom: 14px; }
.form-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; display: block;
}
.form-row { display: flex; gap: 8px; }
.input-group { flex: 1; position: relative; }
.form-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 14px; font-weight: 500; padding: 10px 14px;
  border-radius: 10px; outline: none; transition: border-color .15s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--muted); }
.input-unit {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  font-size: 11px; color: var(--muted); pointer-events: none;
}

/* INGREDIENTS */
.ingredients-wrap {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px;
}
.ing-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 0; }
.ing-chip {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 99px; padding: 4px 10px;
  font-size: 12px; display: flex; align-items: center; gap: 5px;
}
.ing-chip button {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 13px; padding: 0; line-height: 1;
}
.ing-add-row { display: flex; gap: 6px; }
.ing-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Cabinet Grotesk', sans-serif;
  font-size: 13px; padding: 7px 10px; border-radius: 8px; outline: none;
  transition: border-color .15s;
}
.ing-input:focus { border-color: var(--accent); }
.ing-add-btn {
  background: var(--surface3); border: 1px solid var(--border);
  color: var(--accent); font-size: 18px; width: 34px; border-radius: 8px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ANALYZE BTN */
.analyze-btn {
  width: 100%; padding: 15px;
  background: var(--accent); color: #0a0f0a;
  border: none; border-radius: 12px;
  font-family: 'Clash Display', sans-serif;
  font-weight: 700; font-size: 17px; letter-spacing: 0.5px;
  cursor: pointer; transition: transform .1s, opacity .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.analyze-btn:active { transform: scale(.97); }
.analyze-btn:disabled { opacity: .5; cursor: not-allowed; }

/* LOADING */
.loading {
  display: none; text-align: center; padding: 32px 20px;
}
.loading.show { display: block; }
.loading-spinner {
  width: 44px; height: 44px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); }
.loading-steps { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* RESULT */
.result-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden; margin-bottom: 14px;
  display: none;
}
.result-card.show { display: block; }
.result-header {
  background: var(--surface2); padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.result-food-name {
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 18px; flex: 1;
}
.result-confidence {
  font-size: 11px; color: var(--muted);
  background: var(--surface3); padding: 3px 8px; border-radius: 99px;
}

/* KCAL BIG */
.kcal-big {
  display: flex; align-items: baseline; justify-content: center;
  padding: 20px 16px 16px; gap: 4px;
}
.kcal-num {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700; font-size: 52px; color: var(--accent); line-height: 1;
}
.kcal-label { font-size: 16px; color: var(--muted); font-weight: 500; }

/* MACRO GRID */
.macro-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.macro-item {
  background: var(--surface); padding: 14px 10px; text-align: center;
}
.macro-val {
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 22px;
}
.macro-label { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.macro-item.carbs .macro-val { color: var(--accent2); }
.macro-item.prot .macro-val { color: var(--accent3); }
.macro-item.fat .macro-val { color: #ff7eb3; }

/* MICRO */
.micro-section { padding: 14px 16px; }
.micro-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin-bottom: 10px;
}
.micro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.micro-item {
  background: var(--surface2); border-radius: 8px; padding: 8px 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.micro-name { font-size: 11px; color: var(--muted); }
.micro-val { font-size: 12px; font-weight: 700; }

/* NOTE QUALITÀ */
.quality-note {
  padding: 10px 16px 14px;
  font-size: 12px; color: var(--muted); line-height: 1.5;
  border-top: 1px solid var(--border);
}

/* SAVE BTN */
.save-meal-btn {
  width: 100%; padding: 13px;
  background: var(--surface2); border: 1px solid var(--accent);
  color: var(--accent); border-radius: 12px;
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 15px; letter-spacing: 0.5px;
  cursor: pointer; transition: all .15s;
  display: none;
}
.save-meal-btn.show { display: block; }
.save-meal-btn:active { background: rgba(127,255,106,0.1); }

/* STORICO */
.storico-day-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin: 16px 0 8px;
}
.storico-entry {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 8px;
  display: flex; gap: 12px; align-items: flex-start;
}
.storico-img {
  width: 60px; height: 60px; border-radius: 10px;
  object-fit: cover; flex-shrink: 0; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.storico-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.storico-info { flex: 1; min-width: 0; }
.storico-name {
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 15px; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.storico-time { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.storico-macros { display: flex; gap: 8px; flex-wrap: wrap; }
.storico-macro-chip {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 99px; background: var(--surface2);
}
.chip-kcal { color: var(--accent); }
.chip-carb { color: var(--accent2); }
.chip-prot { color: var(--accent3); }
.chip-fat { color: #ff7eb3; }

/* DAILY TOTALS */
.daily-totals {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 4px;
}
.daily-title {
  font-family: 'Clash Display', sans-serif;
  font-weight: 600; font-size: 14px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.daily-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.daily-item { text-align: center; }
.daily-val { font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 18px; }
.daily-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

.page-title {
  font-family: 'Clash Display', sans-serif;
  font-weight: 700; font-size: 24px; letter-spacing: -0.5px; margin-bottom: 4px;
}
.page-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { font-size: 13px; line-height: 1.6; }

.toast {
  position: fixed; top: calc(70px + env(safe-area-inset-top));
  left: 50%; transform: translateX(-50%) translateY(-8px);
  background: var(--accent); color: #0a0f0a;
  font-family: 'Clash Display', sans-serif; font-weight: 700;
  font-size: 13px; padding: 8px 18px; border-radius: 8px;
  opacity: 0; transition: all .25s; z-index: 200; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.error-box {
  background: rgba(255,107,107,.08); border: 1px solid rgba(255,107,107,.3);
  border-radius: 12px; padding: 14px 16px; font-size: 13px;
  color: var(--red); margin-bottom: 14px; display: none; line-height: 1.5;
}
.error-box.show { display: block; }

/* DEL BTN in storico */
.del-btn {
  background: none; border: none; color: var(--muted);
  font-size: 16px; cursor: pointer; padding: 2px 4px; flex-shrink: 0;
}
</style>
</head>
<body>

<nav>
  <div>
    <div class="nav-brand">🥗 NutriSnap</div>
    <div class="nav-sub">AI · Foto + Peso = Precisione</div>
  </div>
</nav>
<div class="toast" id="toast"></div>

<!-- SCAN PAGE -->
<div class="page active" id="page-scan">
  <main>
    <!-- Foto -->
    <div class="scan-zone" id="scan-zone" onclick="document.getElementById('file-input').click()">
      <div class="scan-icon">📸</div>
      <div class="scan-label">Fotografa il pasto</div>
      <div class="scan-sub">Tocca per scattare o scegliere dalla galleria</div>
      <div class="scan-overlay">🔄 Cambia foto</div>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="onPhotoSelected(event)">

    <!-- Nome pasto -->
    <div class="form-section">
      <label class="form-label">Nome pasto (opzionale)</label>
      <input type="text" class="form-input" id="meal-name" placeholder="es. Pasta al pomodoro…">
    </div>

    <!-- Peso -->
    <div class="form-section">
      <label class="form-label">Peso totale del piatto *</label>
      <div class="form-row">
        <div class="input-group">
          <input type="number" class="form-input" id="meal-weight" placeholder="300" style="padding-right:36px">
          <span class="input-unit">g</span>
        </div>
      </div>
    </div>

    <!-- Ingredienti -->
    <div class="form-section">
      <label class="form-label">Ingredienti principali <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(opzionali — migliorano la precisione)</span></label>
      <div class="ingredients-wrap">
        <div class="ing-list" id="ing-list"></div>
        <div class="ing-add-row">
          <input type="text" class="ing-input" id="ing-input" placeholder="es. pasta, pomodoro, olio…" onkeydown="if(event.key==='Enter')addIngredient()">
          <button class="ing-add-btn" onclick="addIngredient()">+</button>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="error-box"></div>

    <!-- Analyze -->
    <button class="analyze-btn" id="analyze-btn" onclick="analyzeFood()">
      <span>🔍</span> Analizza Pasto
    </button>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Analisi in corso…</div>
      <div class="loading-steps" id="loading-steps">Riconosco il cibo 🍽️</div>
    </div>

    <!-- Result -->
    <div style="margin-top:14px">
      <div class="result-card" id="result-card">
        <div class="result-header">
          <div>
            <div class="result-food-name" id="res-name">—</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px" id="res-weight-label">—</div>
          </div>
          <div class="result-confidence" id="res-conf">—</div>
        </div>
        <div class="kcal-big">
          <div class="kcal-num" id="res-kcal">—</div>
          <div class="kcal-label">kcal</div>
        </div>
        <div class="macro-grid">
          <div class="macro-item carbs">
            <div class="macro-val" id="res-carb">—</div>
            <div class="macro-label">Carboidrati</div>
          </div>
          <div class="macro-item prot">
            <div class="macro-val" id="res-prot">—</div>
            <div class="macro-label">Proteine</div>
          </div>
          <div class="macro-item fat">
            <div class="macro-val" id="res-fat">—</div>
            <div class="macro-label">Grassi</div>
          </div>
        </div>
        <div class="micro-section">
          <div class="micro-title">Micronutrienti stimati</div>
          <div class="micro-grid" id="micro-grid"></div>
        </div>
        <div class="quality-note" id="res-note"></div>
      </div>

      <button class="save-meal-btn" id="save-meal-btn" onclick="saveMeal()">
        💾 Salva nel diario
      </button>
    </div>
  </main>
</div>

<!-- STORICO -->
<div class="page" id="page-storico">
  <main>
    <div class="page-title">Diario</div>
    <div class="page-sub">I tuoi pasti analizzati</div>
    <div id="storico-content"></div>
  </main>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('scan')" id="bnav-scan"><span class="bnav-icon">📸</span><span>Analizza</span></button>
  <button class="bnav-btn" onclick="showPage('storico')" id="bnav-storico"><span class="bnav-icon">📓</span><span>Diario</span></button>
</div>

<script>
let state = JSON.parse(localStorage.getItem('nutri_state') || '{}');
if (!state.pasti) state.pasti = [];

let currentPhoto = null; // base64
let currentResult = null;
let ingredients = [];

// ── UI ──────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('bnav-' + id).classList.add('active');
  if (id === 'storico') renderStorico();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-box').classList.remove('show');
}

// ── PHOTO ────────────────────────────────────────────────────────
function onPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentPhoto = e.target.result; // data:image/...;base64,...
    const zone = document.getElementById('scan-zone');
    zone.classList.add('has-img');
    zone.innerHTML = `<img src="${currentPhoto}" alt="foto pasto"><div class="scan-overlay">🔄 Cambia foto</div>`;
    zone.onclick = () => document.getElementById('file-input').click();
    hideError();
    // reset result
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('save-meal-btn').classList.remove('show');
    currentResult = null;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

// ── INGREDIENTS ──────────────────────────────────────────────────
function addIngredient() {
  const inp = document.getElementById('ing-input');
  const val = inp.value.trim();
  if (!val) return;
  ingredients.push(val);
  inp.value = '';
  renderIngredients();
}

function removeIngredient(i) {
  ingredients.splice(i, 1);
  renderIngredients();
}

function renderIngredients() {
  const list = document.getElementById('ing-list');
  list.innerHTML = ingredients.map((ing, i) =>
    `<div class="ing-chip">${ing}<button onclick="removeIngredient(${i})">×</button></div>`
  ).join('');
}

// ── ANALYZE ──────────────────────────────────────────────────────
async function analyzeFood() {
  hideError();
  const weight = parseFloat(document.getElementById('meal-weight').value);
  if (!currentPhoto) { showError('📸 Scatta o carica una foto del pasto prima di continuare.'); return; }
  if (!weight || weight <= 0) { showError('⚖️ Inserisci il peso del pasto in grammi per ottenere valori precisi.'); return; }

  const mealName = document.getElementById('meal-name').value.trim();
  const ingList = ingredients.length ? `\nIngredienti dichiarati: ${ingredients.join(', ')}` : '';

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('save-meal-btn').classList.remove('show');

  const steps = ['Riconosco il cibo 🍽️', 'Calcolo le kcal 🔥', 'Analizzo i macro 💪', 'Stimo i micronutrienti 🧬'];
  let si = 0;
  const stepInterval = setInterval(() => {
    si = (si + 1) % steps.length;
    document.getElementById('loading-steps').textContent = steps[si];
  }, 1400);

  const base64Data = currentPhoto.split(',')[1];
  const mediaType = currentPhoto.split(';')[0].split(':')[1];

  const prompt = `Sei un nutrizionista esperto. Analizza questa foto di cibo e fornisci valori nutrizionali PRECISI per ${weight}g di questo pasto.${ingList}${mealName ? `\nNome pasto suggerito: ${mealName}` : ''}

Rispondi SOLO con un oggetto JSON valido, senza markdown, senza backtick, senza testo prima o dopo:
{
  "nome": "nome del piatto identificato",
  "confidenza": "Alta|Media|Bassa",
  "kcal": numero intero,
  "carboidrati_g": numero decimale,
  "proteine_g": numero decimale,
  "grassi_g": numero decimale,
  "fibre_g": numero decimale,
  "zuccheri_g": numero decimale,
  "sodio_mg": numero intero,
  "calcio_mg": numero intero,
  "ferro_mg": numero decimale,
  "vitamina_c_mg": numero decimale,
  "vitamina_a_mcg": numero intero,
  "potassio_mg": numero intero,
  "nota": "breve nota sulla qualità nutrizionale del pasto (max 1 frase)"
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64Data } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    clearInterval(stepInterval);
    const data = await response.json();

    if (!response.ok) throw new Error(data.error?.message || 'Errore API');

    const raw = data.content.map(c => c.text || '').join('').trim();
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    currentResult = { ...result, peso_g: weight, foto: currentPhoto, ingredienti: [...ingredients], nome_custom: mealName || result.nome };
    showResult(result, weight, mealName);

  } catch (err) {
    clearInterval(stepInterval);
    showError('⚠️ Errore durante l\'analisi: ' + err.message + '. Riprova.');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('analyze-btn').disabled = false;
  }
}

function showResult(r, weight, mealName) {
  document.getElementById('res-name').textContent = mealName || r.nome;
  document.getElementById('res-weight-label').textContent = `${weight}g · identificato come: ${r.nome}`;
  document.getElementById('res-conf').textContent = `Confidenza: ${r.confidenza}`;
  document.getElementById('res-kcal').textContent = r.kcal;
  document.getElementById('res-carb').textContent = r.carboidrati_g + 'g';
  document.getElementById('res-prot').textContent = r.proteine_g + 'g';
  document.getElementById('res-fat').textContent = r.grassi_g + 'g';

  const micros = [
    { nome: 'Fibre', val: r.fibre_g + 'g' },
    { nome: 'Zuccheri', val: r.zuccheri_g + 'g' },
    { nome: 'Sodio', val: r.sodio_mg + 'mg' },
    { nome: 'Calcio', val: r.calcio_mg + 'mg' },
    { nome: 'Ferro', val: r.ferro_mg + 'mg' },
    { nome: 'Vitamina C', val: r.vitamina_c_mg + 'mg' },
    { nome: 'Vitamina A', val: r.vitamina_a_mcg + 'mcg' },
    { nome: 'Potassio', val: r.potassio_mg + 'mg' },
  ];
  document.getElementById('micro-grid').innerHTML = micros.map(m =>
    `<div class="micro-item"><span class="micro-name">${m.nome}</span><span class="micro-val">${m.val}</span></div>`
  ).join('');

  document.getElementById('res-note').textContent = r.nota || '';

  document.getElementById('result-card').classList.add('show');
  document.getElementById('save-meal-btn').classList.add('show');
  document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── SAVE ─────────────────────────────────────────────────────────
function saveMeal() {
  if (!currentResult) return;
  const entry = {
    id: Date.now(),
    timestamp: Date.now(),
    data: new Date().toLocaleDateString('it-IT'),
    ora: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }),
    ...currentResult
  };
  state.pasti.unshift(entry);
  save();
  showToast('✓ Pasto salvato nel diario!');
  document.getElementById('save-meal-btn').classList.remove('show');
}

// ── STORICO ──────────────────────────────────────────────────────
function renderStorico() {
  const el = document.getElementById('storico-content');
  if (!state.pasti.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">Nessun pasto ancora.<br>Fotografa il tuo primo pasto!</div></div>`;
    return;
  }

  // Raggruppa per data
  const byDate = {};
  state.pasti.forEach(p => {
    if (!byDate[p.data]) byDate[p.data] = [];
    byDate[p.data].push(p);
  });

  let html = '';
  Object.entries(byDate).forEach(([data, pasti]) => {
    const totKcal = pasti.reduce((a, p) => a + (p.kcal || 0), 0);
    const totCarb = pasti.reduce((a, p) => a + (p.carboidrati_g || 0), 0);
    const totProt = pasti.reduce((a, p) => a + (p.proteine_g || 0), 0);
    const totFat = pasti.reduce((a, p) => a + (p.grassi_g || 0), 0);

    html += `<div class="daily-totals">
      <div class="daily-title"><span>📅 ${data}</span><span style="font-size:11px;color:var(--muted);font-family:'Cabinet Grotesk'">Totale giornata</span></div>
      <div class="daily-grid">
        <div class="daily-item"><div class="daily-val" style="color:var(--accent)">${Math.round(totKcal)}</div><div class="daily-label">kcal</div></div>
        <div class="daily-item"><div class="daily-val" style="color:var(--accent2)">${totCarb.toFixed(0)}g</div><div class="daily-label">carb</div></div>
        <div class="daily-item"><div class="daily-val" style="color:var(--accent3)">${totProt.toFixed(0)}g</div><div class="daily-label">prot</div></div>
        <div class="daily-item"><div class="daily-val" style="color:#ff7eb3">${totFat.toFixed(0)}g</div><div class="daily-label">grassi</div></div>
      </div>
    </div>`;

    pasti.forEach(p => {
      const imgHtml = p.foto
        ? `<div class="storico-img"><img src="${p.foto}" alt="${p.nome_custom}"></div>`
        : `<div class="storico-img">🍽️</div>`;
      const ings = p.ingredienti?.length ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">${p.ingredienti.join(', ')}</div>` : '';
      html += `<div class="storico-entry">
        ${imgHtml}
        <div class="storico-info">
          <div class="storico-name">${p.nome_custom || p.nome}</div>
          <div class="storico-time">🕐 ${p.ora} · ${p.peso_g}g</div>
          <div class="storico-macros">
            <span class="storico-macro-chip chip-kcal">${p.kcal} kcal</span>
            <span class="storico-macro-chip chip-carb">C ${p.carboidrati_g}g</span>
            <span class="storico-macro-chip chip-prot">P ${p.proteine_g}g</span>
            <span class="storico-macro-chip chip-fat">G ${p.grassi_g}g</span>
          </div>
          ${ings}
        </div>
        <button class="del-btn" onclick="deletePasto(${p.id})">🗑</button>
      </div>`;
    });
  });

  el.innerHTML = html;
}

function deletePasto(id) {
  state.pasti = state.pasti.filter(p => p.id !== id);
  save();
  renderStorico();
  showToast('Pasto eliminato');
}

function save() { localStorage.setItem('nutri_state', JSON.stringify(state)); }
</script>
</body>
</html>
